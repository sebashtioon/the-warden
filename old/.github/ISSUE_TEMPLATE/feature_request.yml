name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you would like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you have considered
      description: Any other solutions or features you have looked at.
  - type: checkboxes
    id: visibility
    attributes:
      label: Scope of feature
      options:
        - label: This feature affects all users.
        - label: This is a security-related feature.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots here.
