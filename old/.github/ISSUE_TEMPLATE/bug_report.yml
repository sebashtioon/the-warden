name: Bug Report
description: Create a report to help us improve
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a bug. Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How do you trigger this bug?
      placeholder: |
        1. Invite bot to #channel
        2. Send message...
        3. Observe error
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Slack Environment
      options:
        - Free Workspace
        - Pro Workspace
        - Enterprise Grid
        - Local Development
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste any relevant error messages or terminal output.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Testing checklist
      options:
        - label: I have checked that the bot has the required scopes/permissions.
          required: true
        - label: I am using the latest version of The Warden.
          required: true
