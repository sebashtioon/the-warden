name: Release Notice

on:
  push:
    paths:
      - 'releases/*.md'
  workflow_dispatch: # Manual trigger button

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process Release File
        id: check
        run: |
          # Find newest file; default to 'Manual' if none exist
          FILE=$(ls -t releases/*.md | head -1 || echo "none")
          if [ "$FILE" = "none" ]; then
            echo "type=Manual Test" >> $GITHUB_OUTPUT
            echo "fname=No file found" >> $GITHUB_OUTPUT
          else
            FILENAME=$(basename "$FILE")
            # Scan for acceleration keywords exactly like your JS grep logic
            if grep -qiE "acceleration|performance|speed|fast" "$FILE"; then
              echo "type=Acceleration Release" >> $GITHUB_OUTPUT
            else
              echo "type=Standard Release" >> $GITHUB_OUTPUT
            fi
            echo "fname=$FILENAME" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          # Using the Bot Token method from your JS
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: 'C0ANV0ZJDR6' # Your WARDEN_DEDICATED_CHANNEL_ID from JS
          payload: |
            {
              "text": "The Warden Notice: ${{ steps.check.outputs.type }}\nFile: ${{ steps.check.outputs.fname }}\nStatus: Verified\nLink: ${{ github.server_url }}/${{ github.repository }}/blob/master/releases/${{ steps.check.outputs.fname }}"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          HACKCLUB_AI_API_KEY: ${{ secrets.HACKCLUB_AI_API_KEY }}
