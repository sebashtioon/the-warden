name: Slack Release Notification

on:
  release:
    types: [published]

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Message
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "The Warden Release Notification: ${{ github.event.release.tag_name }}\n\nRelease Notes:\n${{ github.event.release.body }}\n\nView Release on GitHub: ${{ github.event.release.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
