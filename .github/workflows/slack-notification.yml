name: Slack Release Notification

on:
  release:
    types: [published]
  workflow_dispatch: # <--- ADD THIS LINE

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Message
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "The Warden Release Notification: ${{ github.event.release.tag_name || 'Manual Test' }}\n\nView Release on GitHub: ${{ github.event.release.html_url || 'https://github.com/sebashtioon/the-warden' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
