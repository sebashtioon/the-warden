name: Release Notice

on:
  push:
    paths:
      - 'releases/*.md'
  workflow_dispatch: 

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process Release File
        id: check
        run: |
          FILE=$(ls -t releases/*.md | head -1 || echo "none")
          if [ "$FILE" = "none" ]; then
            echo "type=Manual Test" >> $GITHUB_OUTPUT
            echo "fname=No file found" >> $GITHUB_OUTPUT
          else
            FILENAME=$(basename "$FILE")
            if grep -qiE "acceleration|performance|speed|fast" "$FILE"; then
              echo "type=Acceleration Release" >> $GITHUB_OUTPUT
            else
              echo "type=Standard Release" >> $GITHUB_OUTPUT
            fi
            echo "fname=$FILENAME" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C0ANV0ZJDR6'
          payload: |
            {
              "text": "The Warden Notice: ${{ steps.check.outputs.type }}\nFile: ${{ steps.check.outputs.fname }}\nStatus: Verified"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          HACKCLUB_AI_API_KEY: ${{ secrets.HACKCLUB_AI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CHANNEL_WHITELIST: ${{ secrets.CHANNEL_WHITELIST }}
